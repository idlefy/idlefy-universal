    {{- end }}
  {{- $mergedAnnotations := include "idlefy-universal.mergeAnnotations" (dict "root" $ "resourceAnnotations" (default dict $dsConfig.serviceAccount).annotations) }}
  {{- if $mergedAnnotations }}
  annotations:
    {{- $mergedAnnotations | nindent 4 }}
  {{- end }}
{{- if and $.Values.generic $.Values.generic.extraImagePullSecrets }}
imagePullSecrets:
