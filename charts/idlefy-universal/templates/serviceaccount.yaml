{{- range $deploymentName, $deploymentConfig := .Values.deployments }}
{{- $renderSA := or $deploymentConfig.autoCreateServiceAccount (and $deploymentConfig.serviceAccount (not $deploymentConfig.autoCreateServiceAccount)) }}
{{- if $renderSA }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $deploymentName }}
  labels:
    {{- include "idlefy-universal.labels" (dict "Chart" $.Chart "Release" $.Release "name" $deploymentName) | nindent 4 }}
    {{- $extraLabels := include "idlefy-universal.mergeLabels" (dict "root" $ "resourceLabels" (default dict $deploymentConfig.serviceAccount).labels) }}
    {{- if $extraLabels }}
    {{- $extraLabels | nindent 4 }}
    {{- end }}
  {{- $mergedAnnotations := include "idlefy-universal.mergeAnnotations" (dict "root" $ "resourceAnnotations" (default dict $deploymentConfig.serviceAccount).annotations) }}
  {{- if $mergedAnnotations }}
  annotations:
    {{- $mergedAnnotations | nindent 4 }}
  {{- end }}
{{- if and $.Values.generic $.Values.generic.extraImagePullSecrets }}
imagePullSecrets:
  {{- toYaml $.Values.generic.extraImagePullSecrets | nindent 2 }}
{{- end }}
---
{{- end }}
{{- end }}
{{- range $stsName, $stsConfig := .Values.statefulSets }}
{{- $renderSA := or $stsConfig.autoCreateServiceAccount (and $stsConfig.serviceAccount (not $stsConfig.autoCreateServiceAccount)) }}
{{- if $renderSA }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $stsName }}
  labels:
    {{- include "idlefy-universal.labels" (dict "Chart" $.Chart "Release" $.Release "name" $stsName) | nindent 4 }}
    {{- $extraLabels := include "idlefy-universal.mergeLabels" (dict "root" $ "resourceLabels" (default dict $stsConfig.serviceAccount).labels) }}
    {{- if $extraLabels }}
