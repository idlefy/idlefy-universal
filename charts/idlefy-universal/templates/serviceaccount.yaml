    {{- end }}
  {{- $mergedAnnotations := include "idlefy-universal.mergeAnnotations" (dict "root" $ "resourceAnnotations" (default dict $stsConfig.serviceAccount).annotations) }}
  {{- if $mergedAnnotations }}
  annotations:
    {{- $mergedAnnotations | nindent 4 }}
  {{- end }}
{{- if and $.Values.generic $.Values.generic.extraImagePullSecrets }}
imagePullSecrets:
  {{- toYaml $.Values.generic.extraImagePullSecrets | nindent 2 }}
{{- end }}
---
{{- end }}
{{- end }}
{{- range $dsName, $dsConfig := .Values.daemonSets }}
{{- $renderSA := or $dsConfig.autoCreateServiceAccount (and $dsConfig.serviceAccount (not $dsConfig.autoCreateServiceAccount)) }}
{{- if $renderSA }}
apiVersion: v1
