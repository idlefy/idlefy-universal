suite: test httproute auto create
templates:
  - httproute.yaml
tests:
  - it: should auto-create HTTPRoute from deployment
    set:
      generic:
        ingressesGeneral:
          domain: "example.org"
        httpRoutesGeneral:
          parentRefs:
            - name: shared-gateway
              namespace: gateway-system
      deployments:
        my-app:
          autoCreateHttpRoute: true
          containers:
            main:
              image: nginx
              imageTag: latest
              ports:
                http:
                  containerPort: 8080
                  servicePort: 8080
          httpRoute:
            hostnames:
              - subdomain: my-app
            rules:
              - matches:
                  - path:
                      type: PathPrefix
                      value: /
    asserts:
      - isKind:
          of: HTTPRoute
      - equal:
          path: metadata.name
          value: my-app
      - equal:
          path: spec.parentRefs[0].name
          value: shared-gateway
      - equal:
          path: spec.hostnames[0]
          value: my-app.example.org
      - equal:
          path: spec.rules[0].backendRefs[0].name
          value: my-app
      - equal:
          path: spec.rules[0].backendRefs[0].port
          value: 8080

  - it: should auto-populate backendRef from deployment container ports
    set:
      generic:
        ingressesGeneral:
          domain: "example.org"
        httpRoutesGeneral:
          parentRefs:
            - name: gw
              namespace: gw-ns
      deployments:
        api-svc:
          autoCreateHttpRoute: true
          containers:
            main:
              image: api
              imageTag: "1.0"
              ports:
                http:
                  containerPort: 3000
                  servicePort: 3000
          httpRoute:
            hostnames:
              - subdomain: api
            rules:
              - matches:
                  - path:
                      type: PathPrefix
                      value: /
    asserts:
      - equal:
          path: spec.rules[0].backendRefs[0].name
          value: api-svc
      - equal:
          path: spec.rules[0].backendRefs[0].port
          value: 3000

  - it: should default hostname to deployment name as subdomain when httpRoute.hostnames not specified
    set:
      generic:
        ingressesGeneral:
          domain: "example.org"
        httpRoutesGeneral:
          parentRefs:
            - name: gw
              namespace: gw-ns
      deployments:
        web-app:
          autoCreateHttpRoute: true
          containers:
            main:
              image: web
              imageTag: latest
              ports:
                http:
                  containerPort: 80
          httpRoute:
            rules:
              - matches:
                  - path:
                      type: PathPrefix
                      value: /
    asserts:
      - equal:
          path: spec.hostnames[0]
          value: web-app.example.org
