name: Helm Chart CI

on:
  push:
    branches: [ main ]
    paths:
      - 'charts/**'
      - 'examples/**'
      - '.github/workflows/helm.yaml'
  pull_request:
    branches: [ main ]
    paths:
      - 'charts/**'
      - 'examples/**'
      - '.github/workflows/helm.yaml'
  release:
    types: [created]

env:
  CHART_DIR: charts/idlefy-universal

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Check example mirrors are in sync
        run: scripts/check-example-mirrors.sh

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: v3.17.3

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.13'

      - name: Set up chart-testing
        uses: helm/chart-testing-action@6ec842c01de15ebb84c8627d2744a0c2f2755c9f # v2.8.0

      - name: Run chart-testing (list-changed)
        id: list-changed
        run: |
          changed=$(ct list-changed --config ct.yaml)
          if [[ -n "$changed" ]]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Run chart-testing (lint)
        run: ct lint --config ct.yaml

      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        if: steps.list-changed.outputs.changed == 'true'
        with:
          node_image: kindest/node:v1.35.0@sha256:452d707d4862f52530247495d180205e029056831160e22870e37e3f6c1ac31f
          wait: 180s

      - name: Install cert-manager (CRDs + controller + webhook + cainjector)
        if: steps.list-changed.outputs.changed == 'true'
        run: |
          set -euo pipefail
          # Full cert-manager — needed because example 02 (web-with-tls)
          # relies on Certificate reconciliation, not just CRD presence.
          kubectl apply -f https://github.com/cert-manager/cert-manager/releases/download/v1.18.2/cert-manager.yaml
          # Wait for the webhook to be Ready before applying any
          # cert-manager.io resource (controller validates against it).
          kubectl wait --for=condition=Available --timeout=180s \
            -n cert-manager \
            deployment/cert-manager \
            deployment/cert-manager-webhook \
            deployment/cert-manager-cainjector

      - name: Install selfsigned ClusterIssuer
        if: steps.list-changed.outputs.changed == 'true'
        # Used by examples/02-web-with-tls. Apply AFTER cert-manager is
        # Ready (otherwise the webhook rejects the CR).
        run: |
          set -euo pipefail
          cat <<'EOF' | kubectl apply -f -
          apiVersion: cert-manager.io/v1
          kind: ClusterIssuer
          metadata:
            name: selfsigned
          spec:
            selfSigned: {}
          EOF

      - name: Install Prometheus Operator ServiceMonitor CRD
        if: steps.list-changed.outputs.changed == 'true'
        run: |
          set -euo pipefail
          kubectl apply -f https://raw.githubusercontent.com/prometheus-operator/prometheus-operator/v0.74.0/example/prometheus-operator-crd/monitoring.coreos.com_servicemonitors.yaml

      - name: Install Gateway API standard CRDs (v1.5.1)
        if: steps.list-changed.outputs.changed == 'true'
        run: |
          set -euo pipefail
          # Standard channel: HTTPRoute, Gateway, GatewayClass, ReferenceGrant, etc.
          kubectl apply --server-side=true \
            -f https://github.com/kubernetes-sigs/gateway-api/releases/download/v1.5.1/standard-install.yaml
          # Wait for Gateway API CRDs to be Established before any chart that
          # references them runs. Default `helm/kind-action` waits 120s for the
          # cluster only; CRDs take additional time after `--server-side` apply.
          kubectl wait --for=condition=Established --timeout=120s \
            crd/httproutes.gateway.networking.k8s.io \
            crd/gateways.gateway.networking.k8s.io \
            crd/gatewayclasses.gateway.networking.k8s.io \
            crd/referencegrants.gateway.networking.k8s.io

      - name: Run chart-testing (install)
        if: steps.list-changed.outputs.changed == 'true'
        run: ct install --config ct.yaml

      - name: Set up Helm unittest plugin
        run: |
          helm plugin install https://github.com/helm-unittest/helm-unittest.git --version 0.7.2

      - name: Run Helm unit tests
        run: |
          helm unittest $CHART_DIR

  create-release:
    needs: lint-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    outputs:
      chart-version: ${{ steps.chart-info.outputs.chart-version }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Get Chart Info
        id: chart-info
        run: |
          CHART_VERSION=$(grep -Po '^version:\s*\K.*' $CHART_DIR/Chart.yaml | tr -d '[:space:]')
          CHART_NAME=$(grep -Po '^name:\s*\K.*' $CHART_DIR/Chart.yaml | tr -d '[:space:]')
          echo "chart-name=$CHART_NAME" >> $GITHUB_OUTPUT
          echo "chart-version=$CHART_VERSION" >> $GITHUB_OUTPUT

      - name: Generate Release Notes
        id: release-notes
        run: |
          # Get commit messages since last tag
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          
          if [ -z "$LAST_TAG" ]; then
            COMMIT_LOG=$(git log --pretty=format:"* %s (%h)" -n 10)
          else
            COMMIT_LOG=$(git log $LAST_TAG..HEAD --pretty=format:"* %s (%h)")
          fi
          
          # Create release notes with chart info and commits
          cat > release_notes.md << EOF
          # Release ${{ steps.chart-info.outputs.chart-name }} v${{ steps.chart-info.outputs.chart-version }}
          
          ## Changes in this release:
          
          $COMMIT_LOG
          
          ## Chart Info
          
          * Chart Name: ${{ steps.chart-info.outputs.chart-name }}
          * Version: ${{ steps.chart-info.outputs.chart-version }}
          * Generated: $(date +'%Y-%m-%d %H:%M:%S')
          EOF
          
          # Convert release notes to one line for GitHub Actions
          RELEASE_NOTES="$(cat release_notes.md)"
          delimiter="$(openssl rand -hex 8)"
          echo "release-notes<<$delimiter" >> $GITHUB_OUTPUT
          echo "$RELEASE_NOTES" >> $GITHUB_OUTPUT
          echo "$delimiter" >> $GITHUB_OUTPUT

      - name: Create Release and Tag
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          name: "v${{ steps.chart-info.outputs.chart-version }}"
          tag_name: "v${{ steps.chart-info.outputs.chart-version }}"
          body: ${{ steps.release-notes.outputs.release-notes }}
          draft: false
          prerelease: false

  publish-auto-release:
    needs: create-release
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
      id-token: write       # cosign keyless OIDC + SLSA provenance OIDC
      attestations: write   # actions/attest-build-provenance
    # Serialize publish jobs so the `latest` retag from an older commit cannot
    # overwrite the `latest` retag from a newer commit when two merges land
    # close together. `cancel-in-progress: false` waits for the in-flight job
    # rather than killing it (kill would skip the retag entirely).
    concurrency:
      group: ghcr-publish
      cancel-in-progress: false
    env:
      # Force lowercase + literal `idlefy`. `github.repository_owner` is
      # MixedCase on GitHub but GHCR namespaces are lowercase only; pinning
      # to a literal also defends against forks accidentally publishing to
      # the wrong namespace (the publish step is gated by `ref == main` but
      # ref filtering does not constrain `repository_owner`).
      GHCR_NAMESPACE: idlefy
    steps:
      - name: Checkout
        # Default behavior on `push` events checks out the triggering SHA,
        # which is guaranteed to match the commit `create-release` ran against
        # (and therefore the chart-version output we use for the `latest`
        # retag). Forcing `ref: main` would re-resolve at job-execution time
        # and race with newer merges.
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Guard — only the `idlefy` org may publish
        run: |
          set -euo pipefail
          actual=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          if [[ "$actual" != "idlefy" ]]; then
            echo "::error::publish-auto-release ran under namespace '$actual' but only 'idlefy' may publish."
            exit 1
          fi

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: v3.17.3

      - name: Install oras
        # `oras` is NOT in the default ubuntu-latest toolset. Install
        # unconditionally; the download is ~3 MB and adds <2s. The runner
        # may add `oras` to its toolset in the future, but defaulting to
        # install is the safe choice.
        run: |
          set -euo pipefail
          ORAS_VERSION=1.2.0
          curl -sSL "https://github.com/oras-project/oras/releases/download/v${ORAS_VERSION}/oras_${ORAS_VERSION}_linux_amd64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin oras
          oras version

      - name: Package chart
        id: package
        run: |
          set -euo pipefail
          mkdir -p .cr-release-packages
          helm package $CHART_DIR --destination .cr-release-packages
          # Assert exactly one tgz was produced; multiple is a bug.
          COUNT=$(ls .cr-release-packages/*.tgz | wc -l)
          if [[ "$COUNT" -ne 1 ]]; then
            echo "::error::expected exactly 1 tgz, got $COUNT"
            ls -la .cr-release-packages/
            exit 1
          fi
          PACKAGE_PATH=$(ls .cr-release-packages/*.tgz)
          echo "package_path=$PACKAGE_PATH" >> $GITHUB_OUTPUT
          echo "Packaged: $PACKAGE_PATH"

      - name: Log in to GHCR (helm)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | helm registry login ghcr.io \
                -u ${{ github.actor }} \
                --password-stdin

      - name: Log in to GHCR (oras)
        # `oras tag` reads docker-config credentials, NOT the Helm registry
        # credential file. Without this step the retag below 401s.
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | oras login ghcr.io \
                -u ${{ github.actor }} \
                --password-stdin

      - name: Push chart to GHCR (versioned tag)
        run: |
          set -euo pipefail
          helm push "${{ steps.package.outputs.package_path }}" \
            "oci://ghcr.io/${GHCR_NAMESPACE}"

      # --- Supply-chain hardening (SBOM + cosign + SLSA L3) ----------------
      # Order matters: SBOM attach must happen before `oras discover` reads
      # it back; cosign signs both chart and SBOM as OCI 1.1 referrers;
      # SLSA provenance is the final binding. All gated by in-workflow
      # verify steps so a release that cannot self-verify fails immediately.

      - name: Install syft (SBOM generator)
        uses: anchore/sbom-action/download-syft@4d571ad5b30c70d2050b4f803b58afb0c93b6ad8  # v0.18.0
        with:
          syft-version: v1.18.1

      - name: Install cosign
        uses: sigstore/cosign-installer@d7d6bc7722e3daa8354c50bcb52f4837da5e9b6a  # v3.8.1
        with:
          cosign-release: v2.4.1

      - name: Generate SPDX SBOM for the chart artifact
        id: sbom
        env:
          CHART_NAME_INPUT: idlefy-universal
          CHART_VERSION: ${{ needs.create-release.outputs.chart-version }}
          PACKAGE_PATH: ${{ steps.package.outputs.package_path }}
        run: |
          set -euo pipefail
          # syft 1.x does not (yet) support the Helm chart OCI media type, so
          # scan the local tgz — same bytes that `helm push` uploaded.
          OCI_REF="ghcr.io/${GHCR_NAMESPACE}/${CHART_NAME_INPUT}:${CHART_VERSION}"
          syft "file:${PACKAGE_PATH}" \
            -o spdx-json=sbom.spdx.json \
            --source-name "${CHART_NAME_INPUT}" \
            --source-version "${CHART_VERSION}"
          jq -e '.name == "'"${CHART_NAME_INPUT}"'"' sbom.spdx.json >/dev/null
          echo "sbom_path=$(realpath sbom.spdx.json)" >> "$GITHUB_OUTPUT"
          echo "oci_ref=${OCI_REF}" >> "$GITHUB_OUTPUT"
          echo "chart_version=${CHART_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Attach SBOM as OCI referrer
        env:
          OCI_REF: ${{ steps.sbom.outputs.oci_ref }}
          SBOM_PATH: ${{ steps.sbom.outputs.sbom_path }}
        run: |
          set -euo pipefail
          # oras login already done above (for the latest retag).
          oras attach --artifact-type application/spdx+json \
            "${OCI_REF}" \
            "${SBOM_PATH}:application/spdx+json"
          oras discover --format json "${OCI_REF}" \
            | jq '.manifests[] | select(.artifactType == "application/spdx+json")'

      - name: Upload SBOM as workflow artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: sbom-spdx-${{ steps.sbom.outputs.chart_version }}
          path: ${{ steps.sbom.outputs.sbom_path }}
          retention-days: 90
          if-no-files-found: error

      - name: Sign chart with cosign (keyless OIDC)
        env:
          OCI_REF: ${{ steps.sbom.outputs.oci_ref }}
          COSIGN_YES: "true"
          COSIGN_REGISTRY_REFERRERS_MODE: oci-1-1
        run: |
          set -euo pipefail
          cosign sign --yes \
            --oidc-issuer https://token.actions.githubusercontent.com \
            "${OCI_REF}"

      - name: Sign SBOM referrer with cosign
        env:
          OCI_REF: ${{ steps.sbom.outputs.oci_ref }}
          COSIGN_YES: "true"
          COSIGN_REGISTRY_REFERRERS_MODE: oci-1-1
        run: |
          set -euo pipefail
          SBOM_DIGEST=$(oras discover --format json "${OCI_REF}" \
            | jq -r '.manifests[] | select(.artifactType == "application/spdx+json") | .digest')
          if [[ -z "${SBOM_DIGEST}" || "${SBOM_DIGEST}" == "null" ]]; then
            echo "::error::no SBOM referrer found for ${OCI_REF}"
            exit 1
          fi
          cosign sign --yes \
            --oidc-issuer https://token.actions.githubusercontent.com \
            "ghcr.io/${GHCR_NAMESPACE}/idlefy-universal@${SBOM_DIGEST}"

      - name: Verify chart cosign signature
        env:
          OCI_REF: ${{ steps.sbom.outputs.oci_ref }}
        run: |
          set -euo pipefail
          cosign verify \
            --certificate-identity-regexp "^https://github.com/${{ github.repository }}/" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "${OCI_REF}" | jq '.[0].critical'

      - name: Resolve chart + SBOM artifact digests
        id: digest
        env:
          OCI_REF: ${{ steps.sbom.outputs.oci_ref }}
        run: |
          set -euo pipefail
          CHART_DIGEST=$(oras manifest fetch --descriptor "${OCI_REF}" | jq -r '.digest')
          if [[ -z "${CHART_DIGEST}" || "${CHART_DIGEST}" == "null" ]]; then
            echo "::error::could not resolve chart digest for ${OCI_REF}"
            exit 1
          fi
          echo "chart_digest=${CHART_DIGEST}" >> "$GITHUB_OUTPUT"
          SBOM_DIGEST=$(oras discover --format json "${OCI_REF}" \
            | jq -r '.manifests[] | select(.artifactType == "application/spdx+json") | .digest')
          echo "sbom_digest=${SBOM_DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Attest build provenance (chart)
        uses: actions/attest-build-provenance@7668571508540a607bdfd90a87a560489fe372eb  # v2.1.0
        with:
          subject-name: ghcr.io/${{ env.GHCR_NAMESPACE }}/idlefy-universal
          subject-digest: ${{ steps.digest.outputs.chart_digest }}

      - name: Attest build provenance (SBOM)
        if: steps.digest.outputs.sbom_digest != ''
        uses: actions/attest-build-provenance@7668571508540a607bdfd90a87a560489fe372eb  # v2.1.0
        with:
          subject-name: ghcr.io/${{ env.GHCR_NAMESPACE }}/idlefy-universal
          subject-digest: ${{ steps.digest.outputs.sbom_digest }}

      - name: Verify SLSA build provenance
        # `gh attestation verify oci://<ref>` resolves the chart digest by
        # reaching out to GHCR; that resolution needs docker-config creds
        # set by the earlier `oras login` (see "Log in to GHCR (oras)").
        # If that login step is moved or removed, this step will fail
        # with a misleading "no attestation found" rather than auth error.
        env:
          OCI_REF: ${{ steps.sbom.outputs.oci_ref }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh attestation verify "oci://${OCI_REF}" \
            --owner "${{ github.repository_owner }}" --format json \
            | jq '.[0].verificationResult.statement.predicate.buildDefinition.externalParameters'
      # --- end supply-chain hardening --------------------------------------

      - name: Tag as latest on GHCR
        # Policy: `latest` follows the most recent stable auto-release on main.
        # Pre-release versions (rc/alpha/beta/pre) MUST NOT move `latest`,
        # even if create-release flips `prerelease: false` later. Manual-release
        # flow (Task 4) does not touch `latest`.
        run: |
          set -euo pipefail
          CHART_NAME=$(basename "$CHART_DIR")
          VERSION="${{ needs.create-release.outputs.chart-version }}"
          if [[ "$VERSION" =~ -(rc|alpha|beta|pre)([.-][0-9A-Za-z]+)*$ ]]; then
            echo "Skipping 'latest' retag for prerelease version: $VERSION"
            exit 0
          fi
          oras tag \
            "ghcr.io/${GHCR_NAMESPACE}/${CHART_NAME}:${VERSION}" \
            latest

  # Manual releases carry the same supply-chain trust chain (SBOM + cosign +
  # SLSA L3) as auto-releases — an agent or human auditor MUST be able to
  # verify any published version regardless of how it was produced. The block
  # below mirrors `publish-auto-release` step-for-step; the only structural
  # divergence is that chart-version is read from Chart.yaml inline (manual
  # publish does not run `create-release` first). See
  # docs/how-to/verify-supply-chain.md for the verification recipe.
  #
  # KNOWN LIMITATION — re-edit of a Release in the GitHub UI fires
  # `release: edited` (not `created`), so this job will not re-run; that is
  # intentional, because `helm push` is not idempotent against an existing
  # tag and re-running would either no-op (best case) or leave a half-signed
  # artifact (worst case). If a Release needs a re-publish, delete the tag,
  # bump Chart.yaml version, and create a fresh Release.
  publish-manual-release:
    needs: lint-test
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    permissions:
      contents: read
      packages: write
      id-token: write       # cosign keyless OIDC + SLSA provenance OIDC
      attestations: write   # actions/attest-build-provenance
    concurrency:
      group: ghcr-publish
      cancel-in-progress: false
    env:
      GHCR_NAMESPACE: idlefy
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Guard — only the `idlefy` org may publish
        run: |
          set -euo pipefail
          actual=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          if [[ "$actual" != "idlefy" ]]; then
            echo "::error::publish-manual-release ran under namespace '$actual' but only 'idlefy' may publish."
            exit 1
          fi

      - name: Get Chart Info
        id: chart-info
        run: |
          set -euo pipefail
          CHART_VERSION=$(grep -Po '^version:\s*\K.*' $CHART_DIR/Chart.yaml | tr -d '[:space:]')
          CHART_NAME=$(grep -Po '^name:\s*\K.*' $CHART_DIR/Chart.yaml | tr -d '[:space:]')
          echo "chart-name=$CHART_NAME" >> $GITHUB_OUTPUT
          echo "chart-version=$CHART_VERSION" >> $GITHUB_OUTPUT

      - name: Assert release tag matches Chart.yaml version
        # `release: created` checks out the tag commit, so Chart.yaml is whatever
        # was committed at that tag. The release name is independent (maintainer
        # types it in the Release UI). Refuse to publish if they disagree —
        # otherwise we sign+attest version X under a Release page named v(Y).
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          CHART_VERSION: ${{ steps.chart-info.outputs.chart-version }}
        run: |
          set -euo pipefail
          if [[ "${RELEASE_TAG}" != "v${CHART_VERSION}" ]]; then
            echo "::error::release tag '${RELEASE_TAG}' does not match Chart.yaml version 'v${CHART_VERSION}'"
            exit 1
          fi

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: v3.17.3

      - name: Install oras
        run: |
          set -euo pipefail
          ORAS_VERSION=1.2.0
          curl -sSL "https://github.com/oras-project/oras/releases/download/v${ORAS_VERSION}/oras_${ORAS_VERSION}_linux_amd64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin oras
          oras version

      - name: Package chart
        id: package
        run: |
          set -euo pipefail
          mkdir -p .cr-release-packages
          helm package $CHART_DIR --destination .cr-release-packages
          COUNT=$(ls .cr-release-packages/*.tgz | wc -l)
          if [[ "$COUNT" -ne 1 ]]; then
            echo "::error::expected exactly 1 tgz, got $COUNT"
            exit 1
          fi
          PACKAGE_PATH=$(ls .cr-release-packages/*.tgz)
          echo "package_path=$PACKAGE_PATH" >> $GITHUB_OUTPUT

      - name: Log in to GHCR (helm)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | helm registry login ghcr.io \
                -u ${{ github.actor }} \
                --password-stdin

      - name: Log in to GHCR (oras)
        # `oras tag` / `oras attach` read docker-config credentials, NOT the
        # Helm registry credential file. Without this step the SBOM attach
        # and SLSA verify steps 401.
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | oras login ghcr.io \
                -u ${{ github.actor }} \
                --password-stdin

      - name: Push chart to GHCR (versioned tag)
        run: |
          set -euo pipefail
          helm push "${{ steps.package.outputs.package_path }}" \
            "oci://ghcr.io/${GHCR_NAMESPACE}"

      # --- Supply-chain hardening (SBOM + cosign + SLSA L3) ----------------
      # Identical step-by-step to publish-auto-release; see that job for
      # ordering rationale.

      - name: Install syft (SBOM generator)
        uses: anchore/sbom-action/download-syft@4d571ad5b30c70d2050b4f803b58afb0c93b6ad8  # v0.18.0
        with:
          syft-version: v1.18.1

      - name: Install cosign
        uses: sigstore/cosign-installer@d7d6bc7722e3daa8354c50bcb52f4837da5e9b6a  # v3.8.1
        with:
          cosign-release: v2.4.1

      - name: Generate SPDX SBOM for the chart artifact
        id: sbom
        env:
          CHART_NAME_INPUT: ${{ steps.chart-info.outputs.chart-name }}
          CHART_VERSION: ${{ steps.chart-info.outputs.chart-version }}
          PACKAGE_PATH: ${{ steps.package.outputs.package_path }}
        run: |
          set -euo pipefail
          OCI_REF="ghcr.io/${GHCR_NAMESPACE}/${CHART_NAME_INPUT}:${CHART_VERSION}"
          syft "file:${PACKAGE_PATH}" \
            -o spdx-json=sbom.spdx.json \
            --source-name "${CHART_NAME_INPUT}" \
            --source-version "${CHART_VERSION}"
          jq -e '.name == "'"${CHART_NAME_INPUT}"'"' sbom.spdx.json >/dev/null
          echo "sbom_path=$(realpath sbom.spdx.json)" >> "$GITHUB_OUTPUT"
          echo "oci_ref=${OCI_REF}" >> "$GITHUB_OUTPUT"
          echo "chart_version=${CHART_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Attach SBOM as OCI referrer
        env:
          OCI_REF: ${{ steps.sbom.outputs.oci_ref }}
          SBOM_PATH: ${{ steps.sbom.outputs.sbom_path }}
        run: |
          set -euo pipefail
          oras attach --artifact-type application/spdx+json \
            "${OCI_REF}" \
            "${SBOM_PATH}:application/spdx+json"
          oras discover --format json "${OCI_REF}" \
            | jq '.manifests[] | select(.artifactType == "application/spdx+json")'

      - name: Upload SBOM as workflow artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          # `-manual` suffix avoids display-name collision with auto-release
          # SBOMs in the workflow artifact store; both can exist in the 90-day
          # retention window for the same chart version (rare, but documented).
          name: sbom-spdx-${{ steps.sbom.outputs.chart_version }}-manual
          path: ${{ steps.sbom.outputs.sbom_path }}
          retention-days: 90
          if-no-files-found: error

      - name: Sign chart with cosign (keyless OIDC)
        env:
          OCI_REF: ${{ steps.sbom.outputs.oci_ref }}
          COSIGN_YES: "true"
          COSIGN_REGISTRY_REFERRERS_MODE: oci-1-1
        run: |
          set -euo pipefail
          cosign sign --yes \
            --oidc-issuer https://token.actions.githubusercontent.com \
            "${OCI_REF}"

      - name: Sign SBOM referrer with cosign
        env:
          OCI_REF: ${{ steps.sbom.outputs.oci_ref }}
          CHART_NAME_INPUT: ${{ steps.chart-info.outputs.chart-name }}
          COSIGN_YES: "true"
          COSIGN_REGISTRY_REFERRERS_MODE: oci-1-1
        run: |
          set -euo pipefail
          SBOM_DIGEST=$(oras discover --format json "${OCI_REF}" \
            | jq -r '.manifests[] | select(.artifactType == "application/spdx+json") | .digest')
          if [[ -z "${SBOM_DIGEST}" || "${SBOM_DIGEST}" == "null" ]]; then
            echo "::error::no SBOM referrer found for ${OCI_REF}"
            exit 1
          fi
          cosign sign --yes \
            --oidc-issuer https://token.actions.githubusercontent.com \
            "ghcr.io/${GHCR_NAMESPACE}/${CHART_NAME_INPUT}@${SBOM_DIGEST}"

      - name: Verify chart cosign signature
        env:
          OCI_REF: ${{ steps.sbom.outputs.oci_ref }}
        run: |
          set -euo pipefail
          cosign verify \
            --certificate-identity-regexp "^https://github.com/${{ github.repository }}/" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "${OCI_REF}" | jq '.[0].critical'

      - name: Resolve chart + SBOM artifact digests
        id: digest
        env:
          OCI_REF: ${{ steps.sbom.outputs.oci_ref }}
        run: |
          set -euo pipefail
          CHART_DIGEST=$(oras manifest fetch --descriptor "${OCI_REF}" | jq -r '.digest')
          if [[ -z "${CHART_DIGEST}" || "${CHART_DIGEST}" == "null" ]]; then
            echo "::error::could not resolve chart digest for ${OCI_REF}"
            exit 1
          fi
          echo "chart_digest=${CHART_DIGEST}" >> "$GITHUB_OUTPUT"
          SBOM_DIGEST=$(oras discover --format json "${OCI_REF}" \
            | jq -r '.manifests[] | select(.artifactType == "application/spdx+json") | .digest')
          echo "sbom_digest=${SBOM_DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Attest build provenance (chart)
        uses: actions/attest-build-provenance@7668571508540a607bdfd90a87a560489fe372eb  # v2.1.0
        with:
          subject-name: ghcr.io/${{ env.GHCR_NAMESPACE }}/${{ steps.chart-info.outputs.chart-name }}
          subject-digest: ${{ steps.digest.outputs.chart_digest }}

      - name: Attest build provenance (SBOM)
        if: steps.digest.outputs.sbom_digest != ''
        uses: actions/attest-build-provenance@7668571508540a607bdfd90a87a560489fe372eb  # v2.1.0
        with:
          subject-name: ghcr.io/${{ env.GHCR_NAMESPACE }}/${{ steps.chart-info.outputs.chart-name }}
          subject-digest: ${{ steps.digest.outputs.sbom_digest }}

      - name: Verify SLSA build provenance
        # `gh attestation verify oci://<ref>` resolves the chart digest by
        # reaching out to GHCR; that resolution needs docker-config creds
        # set by the earlier `oras login` (see "Log in to GHCR (oras)").
        env:
          OCI_REF: ${{ steps.sbom.outputs.oci_ref }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh attestation verify "oci://${OCI_REF}" \
            --owner "${{ github.repository_owner }}" --format json \
            | jq '.[0].verificationResult.statement.predicate.buildDefinition.externalParameters'
      # --- end supply-chain hardening --------------------------------------