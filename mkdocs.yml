# mkdocs.yml — Site config for https://idlefy.github.io/idlefy-universal/
# Theme: Material 9.7.x. Strict mode is enabled via the CI invocation
# (`mkdocs build --strict`), not here, so authors get a softer local
# experience when working on a single page.

site_name: idlefy-universal
site_description: Universal Helm chart — typed JSON Schema, agent-native metadata, auto-creation, Gateway API.
site_url: https://idlefy.github.io/idlefy-universal/
repo_url: https://github.com/idlefy/idlefy-universal
edit_uri: edit/main/docs/
docs_dir: docs
site_dir: site

# Internal planning docs and include-only partials are kept inside docs_dir
# (so editors can navigate them) but excluded from the built site so they
# don't leak onto GitHub Pages. Requires mkdocs >= 1.6 (pinned in
# docs/requirements.txt at 1.6.1).
exclude_docs: |
  superpowers/
  _snippets/

theme:
  name: material
  logo: assets/logo.webp
  favicon: assets/logo.webp
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - htmlproofer:
      enabled: !ENV [PROOFER, false]
      raise_error_after_finish: true
      # External link checks are slow + flaky; only run them on the
      # scheduled (weekly) workflow which sets PROOFER_EXTERNAL=true.
      validate_external_urls: !ENV [PROOFER_EXTERNAL, false]

markdown_extensions:
  - admonition
  - attr_list
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets:
      base_path: docs
      check_paths: true
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/idlefy/idlefy-universal

extra_css:
  - assets/extra.css

nav:
  - Home: index.md
  - Tutorials:
      - First app: tutorials/your-first-app.md
      - Add metrics: tutorials/add-metrics.md
      - Gateway API: tutorials/gateway-api.md
  - How-To:
      - Use the deploy wizard: how-to/wizard.md
      - Monitoring: how-to/monitoring.md
      - RBAC: how-to/rbac.md
      - Network policy: how-to/network-policy.md
      - Ingress TLS: how-to/ingress-tls.md
      - Multi-container: how-to/multi-container.md
      - Secrets: how-to/secrets.md
      - PDB & HPA: how-to/pdb-hpa.md
      - Verify the chart's supply chain: how-to/verify-supply-chain.md
  - Reference:
      - Values: reference/values.md
      - Agent metadata: reference/agent-metadata.md
      - Templating: reference/templating.md
      - Validation: reference/validation.md
  - Concepts:
      - Schema-driven values: concepts/schema-driven-values.md
      - Agent-native: concepts/agent-native.md
      - Auto-creation: concepts/auto-creation.md
      - Composability: concepts/composability.md
