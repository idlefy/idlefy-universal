# Property keys that are intentionally per-instance only (no counterpart in
# DeploymentDefaultsSpec). Rule 9 ("DeploymentSpec keys == DeploymentDefaultsSpec
# keys") skips these. Use sparingly — only for features that the spec
# explicitly forbids exposing as a global default (e.g. spec §3.4 prohibits
# *General.rbac; contrast with networkPolicy, which IS in DeploymentDefaultsSpec
# and therefore does NOT appear here).
deployment_defaults_parity_exempt:
  - autoCreateRbac
  - rbac

# Cross-field checks owned by templates/_validation.tpl (informational).
tpl_covered_checks:
  - "cross-resource secretRefs lookup"
  - "release+name length <= 63"
  - "computed-host regex via subdomain + global domain merge"
  - "autoCreateIngress requires at least one container port"
