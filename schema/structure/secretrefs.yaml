properties:
  secretRefs:
    type: object
    additionalProperties:
      type: array
      minItems: 1
      items: {$ref: "#/$defs/SecretRefEntry"}

$defs:
  SecretRefEntry:
    type: object
    additionalProperties: false
    required: [name, secretKeyRef]
    properties:
      name:
        type: string
        pattern: "^[A-Za-z_][A-Za-z0-9_]*$"
        description: Environment variable name (POSIX).
      secretKeyRef: {$ref: "#/$defs/SecretKeyRef"}
