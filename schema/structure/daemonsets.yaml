properties:
  daemonSets:
    type: object
    additionalProperties:
      $ref: "#/$defs/DaemonSetSpec"

$defs:
  DaemonSetSpec:
    type: object
    additionalProperties: false
    required: [containers]
    properties:
      namespace:
        type: string
      containers:
        type: object
        additionalProperties:
          $ref: "#/$defs/ContainerSpec"
      initContainers:
        type: object
        additionalProperties:
          $ref: "#/$defs/ContainerSpec"
      priorityClassName:
        type: string
      serviceAccountName:
        type: string
      nodeSelector:
        type: object
        additionalProperties: true
      tolerations:
        type: array
        items: {$ref: "#/$defs/k8s.io.api.core.v1.Toleration"}
      affinity: {$ref: "#/$defs/k8s.io.api.core.v1.Affinity"}
      annotations:
        type: object
        additionalProperties: true
      labels:
        type: object
        additionalProperties: true
      podAnnotations:
        type: object
        additionalProperties: true
      podLabels:
        type: object
        additionalProperties: true
      securityContext: {$ref: "#/$defs/k8s.io.api.core.v1.PodSecurityContext"}
      volumes:
        type: array
        items: {$ref: "#/$defs/k8s.io.api.core.v1.Volume"}
      hostAliases:
        type: array
        items: {$ref: "#/$defs/HostAlias"}
      dnsConfig: {$ref: "#/$defs/k8s.io.api.core.v1.PodDNSConfig"}
      terminationGracePeriodSeconds:
        type: integer
        minimum: 0
      topologySpreadConstraints:
        type: array
        items: {$ref: "#/$defs/k8s.io.api.core.v1.TopologySpreadConstraint"}
      updateStrategy:
        type: object
        additionalProperties: false
        properties:
          type:
            type: string
            enum: [RollingUpdate, OnDelete]
            default: RollingUpdate
          rollingUpdate:
            type: object
            additionalProperties: false
            properties:
              maxUnavailable:
                oneOf:
                  - {type: integer, minimum: 0}
                  - {type: string}
              maxSurge:
                oneOf:
                  - {type: integer, minimum: 0}
                  - {type: string}
      minReadySeconds:
        type: integer
        minimum: 0
        default: 0
      revisionHistoryLimit:
        type: integer
        minimum: 0
        default: 10
      hostNetwork:
        type: boolean
        default: false
      hostPID:
        type: boolean
        default: false
      hostIPC:
        type: boolean
        default: false
      autoCreateServiceMonitor:
        type: boolean
        default: false
      autoCreatePdb:
        type: boolean
        default: false
      autoCreateServiceAccount:
        type: boolean
        default: false
      autoCreateNetworkPolicy:
        type: boolean
        default: false
      autoCreateRbac:
        type: boolean
        default: false
      networkPolicy:
        $ref: "#/$defs/NetworkPolicySpec"
      rbac:
        $ref: "#/$defs/RbacSpec"
      serviceMonitor:
        $ref: "#/$defs/ServiceMonitorConfig"
      pdb:
        $ref: "#/$defs/PdbConfig"
      serviceAccount:
        $ref: "#/$defs/ServiceAccountConfig"
      probes:
        type: object
        additionalProperties: false
        properties:
          livenessProbe: {$ref: "#/$defs/ProbeSpec"}
          readinessProbe: {$ref: "#/$defs/ProbeSpec"}
          startupProbe: {$ref: "#/$defs/ProbeSpec"}
    allOf:
      - if:
          properties:
            autoCreateNetworkPolicy: {const: true}
          required: [autoCreateNetworkPolicy]
        then:
          required: [networkPolicy]
      - if:
          properties:
            autoCreateRbac: {const: true}
          required: [autoCreateRbac]
        then:
          required: [rbac]
