properties:
  hpas:
    type: object
    additionalProperties:
      $ref: "#/$defs/StandaloneHpaSpec"

$defs:
  StandaloneHpaSpec:
    type: object
    additionalProperties: false
    required: [scaleTargetRef, maxReplicas, metrics]
    properties:
      scaleTargetRef:
        type: object
        additionalProperties: false
        required: [kind, name]
        properties:
          apiVersion: {type: string}
          kind:
            type: string
            enum: [Deployment, StatefulSet, ReplicaSet, ReplicationController]
          name: {type: string}
      minReplicas:
        type: integer
        minimum: 0
      maxReplicas:
        type: integer
        minimum: 1
      metrics:
        type: array
        minItems: 1
        items: {$ref: "#/$defs/HpaMetric"}
      behavior:
        $ref: "#/$defs/k8s.io.api.autoscaling.v2.HorizontalPodAutoscalerBehavior"
