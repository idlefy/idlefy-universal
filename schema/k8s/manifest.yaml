  - {upstream: io.k8s.api.core.v1.TopologySpreadConstraint,       local: k8s.io.api.core.v1.TopologySpreadConstraint}

  # core/v1 — volumes (Volume + every inline source variant)
  - {upstream: io.k8s.api.core.v1.Volume,                         local: k8s.io.api.core.v1.Volume}

  # core/v1 — security
  - {upstream: io.k8s.api.core.v1.PodSecurityContext,             local: k8s.io.api.core.v1.PodSecurityContext}
  - {upstream: io.k8s.api.core.v1.SecurityContext,                local: k8s.io.api.core.v1.SecurityContext}

  # core/v1 — lifecycle
  - {upstream: io.k8s.api.core.v1.Lifecycle,                      local: k8s.io.api.core.v1.Lifecycle}

