upstream:
  source: https://github.com/yannh/kubernetes-json-schema
  ref: 73ff6857b621480320a0ac5bdb01f6baa6a9d01d
  k8s_version: v1.35.0
  fetched_at: "2026-05-12"

# Explicitly listed types. Transitive $ref closure is computed by the
# extractor. Owned $defs (HostAlias, EnvVar, VolumeMount,
# ResourceRequirements, ProbeSpec) are NOT vendored — see design spec.
