  - {upstream: io.k8s.api.core.v1.NodeSelectorRequirement,        local: k8s.io.api.core.v1.NodeSelectorRequirement}
  - {upstream: io.k8s.api.core.v1.PreferredSchedulingTerm,        local: k8s.io.api.core.v1.PreferredSchedulingTerm}
  - {upstream: io.k8s.api.core.v1.PodAffinity,                    local: k8s.io.api.core.v1.PodAffinity}
  - {upstream: io.k8s.api.core.v1.PodAntiAffinity,                local: k8s.io.api.core.v1.PodAntiAffinity}
