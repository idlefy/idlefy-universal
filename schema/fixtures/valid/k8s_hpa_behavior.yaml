deployments:
  app:
    autoCreateService: true
    containers:
      web:
        image: nginx
        imageTag: "1.27"
        ports:
          http: {containerPort: 80}
    hpa:
      minReplicas: 2
      maxReplicas: 20
      metrics:
        - type: Resource
          resource:
            name: cpu
            target:
              type: Utilization
              averageUtilization: 80
      behavior:
        scaleDown:
          stabilizationWindowSeconds: 300
          policies:
            - {type: Percent, value: 50, periodSeconds: 60}
