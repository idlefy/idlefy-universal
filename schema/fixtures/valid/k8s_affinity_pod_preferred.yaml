deployments:
  app:
    containers:
      web:
        image: nginx
        imageTag: "1.27"
        ports:
          http: {containerPort: 80}
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels: {app.kubernetes.io/name: app}
              topologyKey: kubernetes.io/hostname
