deployments:
  api:
    containers:
      main:
        image: api
        imageTag: "1.0"
        ports:
          http: {containerPort: 8080}
    autoCreateNetworkPolicy: true
    networkPolicy:
      policyTypes: [Ingress, Egress]
      ingress:
        - from:
            - podSelector:
                matchLabels: {app.kubernetes.io/component: gateway}
            - namespaceSelector:
                matchLabels: {kubernetes.io/metadata.name: edge}
            - ipBlock:
                cidr: 10.0.0.0/8
                except: [10.0.0.0/24]
          ports:
            - {protocol: TCP, port: 8080}
      egress:
        - to:
            - namespaceSelector:
                matchLabels: {kubernetes.io/metadata.name: kube-system}
          ports:
            - {protocol: UDP, port: 53}
      annotations: {policy.k8s.io/note: "audited"}
      labels:      {tier: backend}
